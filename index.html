<!DOCTYPE html>
<html>
<head>
    <title>Exclusive Content</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; padding: 20px; background-color: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
            border-radius: 15px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            pointer-events: none; 
        }
        /* Tombol Putih Solid seperti di 1000471811.jpg */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: white; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s infinite;
        }
        /* Segitiga play hitam */
        .play-button:after {
            content: '';
            border-style: solid;
            border-width: 12px 0 12px 22px;
            border-color: transparent transparent transparent black;
            margin-left: 5px;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <a href="https://depthschokedirected.com/kinpdqmkw?key=308eaf66481cf68b5726bc4b540bb720" target="_blank">
        <div class="video-container">
            <video preload="metadata" muted playsinline>
                <source src="rus.mp4" type="video/mp4">
            </video>
            <div class="play-button"></div>
        </div>
    </a>
</body>
</html>
